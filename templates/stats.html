<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - ObjectDetectAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="dashboard-wrapper">
        <aside class="sidebar glass-panel">
            <div>
                <a class="sidebar-brand text-white text-decoration-none" href="/">
                    <i class="fas fa-brain text-cyan"></i>
                    <span>ObjectDetect<span class="text-cyan">AI</span></span>
                </a>
                
                <ul class="sidebar-menu">
                    <li>
                        <a href="/dashboard" class="sidebar-link">
                            <i class="fas fa-desktop"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="/history" class="sidebar-link">
                            <i class="fas fa-history"></i>
                            <span>History</span>
                        </a>
                    </li>
                    <li>
                        <a href="/stats" class="sidebar-link active">
                            <i class="fas fa-chart-line"></i>
                            <span>Analytics</span>
                        </a>
                    </li>
                    <li>
                        <a href="/" class="sidebar-link">
                            <i class="fas fa-home"></i>
                            <span>Home Page</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-footer border-t border-secondary-subtle pt-4">
                <div class="d-flex align-items-center justify-content-between">
                    <span class="text-muted"><i class="fas fa-adjust me-2"></i>Theme Mode</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" id="theme-toggle">
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
                <div>
                    <h1 class="font-heading font-bold text-white mb-1">Inference Statistics</h1>
                    <p class="text-muted mb-0">Monitor model usage metrics and detected object distribution</p>
                </div>
            </header>

            <div class="row g-4 mb-5">
                <div class="col-md-3 col-sm-6">
                    <div class="glass-panel kpi-card">
                        <span class="text-muted text-xs uppercase tracking-wider block">Images Analyzed</span>
                        <div class="kpi-value" id="kpi-images">0</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="glass-panel kpi-card">
                        <span class="text-muted text-xs uppercase tracking-wider block">Objects Detected</span>
                        <div class="kpi-value" id="kpi-objects">0</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="glass-panel kpi-card">
                        <span class="text-muted text-xs uppercase tracking-wider block">Most Frequent Class</span>
                        <div class="kpi-value text-gold" id="kpi-frequent" style="background: linear-gradient(135deg, var(--text-primary) 30%, var(--brand-gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">-</div>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="glass-panel kpi-card">
                        <span class="text-muted text-xs uppercase tracking-wider block">Average Confidence</span>
                        <div class="kpi-value" id="kpi-confidence">0%</div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="glass-panel p-4 h-100">
                        <h3 class="h5 text-white mb-4"><i class="fas fa-chart-line text-cyan me-2"></i>Daily Detections Timeline</h3>
                        <div style="position: relative; height:320px; width:100%">
                            <canvas id="timelineChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="glass-panel p-4 h-100">
                        <h3 class="h5 text-white mb-4"><i class="fas fa-chart-pie text-cyan me-2"></i>Object Distribution</h3>
                        <div style="position: relative; height:320px; width:100%">
                            <canvas id="distributionChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) throw new Error('Failed to load stats');

                const data = await res.json();
                
                document.getElementById('kpi-images').textContent = data.total_images;
                document.getElementById('kpi-objects').textContent = data.total_objects;
                document.getElementById('kpi-frequent').textContent = data.most_detected;
                document.getElementById('kpi-confidence').textContent = `${data.average_confidence}%`;

                const ctxTimeline = document.getElementById('timelineChart').getContext('2d');
                new Chart(ctxTimeline, {
                    type: 'line',
                    data: {
                        labels: data.timeline.map(item => item.date),
                        datasets: [
                            {
                                label: 'Images Processed',
                                data: data.timeline.map(item => item.count),
                                borderColor: '#00f2fe',
                                backgroundColor: 'rgba(0, 242, 254, 0.05)',
                                borderWidth: 2.5,
                                fill: true,
                                tension: 0.3
                            },
                            {
                                label: 'Objects Classified',
                                data: data.timeline.map(item => item.obj_count),
                                borderColor: '#c9a84c',
                                backgroundColor: 'transparent',
                                borderWidth: 1.5,
                                fill: false,
                                borderDash: [5, 5]
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#8e8ea0', font: { family: 'Outfit' } }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(255,255,255,0.03)' },
                                ticks: { color: '#8e8ea0', font: { family: 'Outfit' } }
                            },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.03)' },
                                ticks: { color: '#8e8ea0', font: { family: 'Outfit' } }
                            }
                        }
                    }
                });

                const ctxDistribution = document.getElementById('distributionChart').getContext('2d');
                new Chart(ctxDistribution, {
                    type: 'doughnut',
                    data: {
                        labels: data.distribution.labels.slice(0, 7),
                        datasets: [{
                            data: data.distribution.values.slice(0, 7),
                            backgroundColor: [
                                '#00f2fe',
                                '#c9a84c',
                                '#fd79a8',
                                '#00b894',
                                '#ffeaa7',
                                '#0984e3',
                                '#6c5ce7'
                            ],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#8e8ea0', font: { family: 'Outfit' } }
                            }
                        }
                    }
                });

            } catch (err) {
                console.error(err);
                showToast('Failed to load stats details', 'danger');
            }
        });
    </script>
</body>
</html>
